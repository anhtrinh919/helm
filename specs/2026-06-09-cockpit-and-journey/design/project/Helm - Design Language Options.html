<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Helm — Design Language Options</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..500&family=Mulish:wght@400;500;600;700&family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Spectral:ital,wght@0,400;0,500;0,600;1,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Figtree:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #EDE9E1; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="design-language.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, ThemedFrontDoor, THEMES } = window;
const W = 760, H = 600;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="dl" title="Design language — bolder directions" subtitle="Same Front Door, four daring aesthetics. Judge the feel. Layout is settled (Journey C · Cockpit A).">
        <DCArtboard id="nocturne"   label="A · Nocturne — dark cockpit, molten amber" width={W} height={H}><ThemedFrontDoor t={THEMES.nocturne} /></DCArtboard>
        <DCArtboard id="vermillion" label="B · Vermillion — saturated poster"          width={W} height={H}><ThemedFrontDoor t={THEMES.vermillion} /></DCArtboard>
        <DCArtboard id="chroma"     label="C · Chroma — high-contrast, lime highlighter" width={W} height={H}><ThemedFrontDoor t={THEMES.chroma} /></DCArtboard>
        <DCArtboard id="cobalt"     label="D · Cobalt — electric blue field"            width={W} height={H}><ThemedFrontDoor t={THEMES.cobalt} /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
