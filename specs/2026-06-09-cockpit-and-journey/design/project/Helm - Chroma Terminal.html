<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Helm — Chroma · Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #EDE9E1; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="design-terminal.jsx"></script>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, TerminalFrontDoor, TTHEMES } = window;
const W = 820, H = 580;
function App() {
  return (
    <DesignCanvas>
      <DCSection id="term" title="Chroma · Terminal — retro evolution of Option C" subtitle="Typewriter/mono type, lime highlighter + block cursor, retro graphics. Copy stays plain-language. Pick how far to push it.">
        <DCArtboard id="teletype"  label="A · Teletype — paper, restrained"      width={W} height={H}><TerminalFrontDoor t={TTHEMES.teletype} /></DCArtboard>
        <DCArtboard id="dotmatrix" label="B · Dot-Matrix — dot-grid + hard edges" width={W} height={H}><TerminalFrontDoor t={TTHEMES.dotmatrix} /></DCArtboard>
        <DCArtboard id="crt"       label="C · CRT — dark phosphor, full retro"    width={W} height={H}><TerminalFrontDoor t={TTHEMES.crt} /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
